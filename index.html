 <!DOCTYPE html>

 <html lang="ja">

 <head>
 	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
 	<meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="SimplePomodoroTimer">
 	<script type="module" src="assets/dist/main.js"></script>
  <script type="module" src="top.js"></script>
 	<title>SimplePomodoroTimer</title>
 	<link rel="icon" type="image/x-icon" href="favicon.ico">
 	<link rel="stylesheet" href="assets/dist/style.css">
 </head>

 <body>
 	<div class="container-xxl p-5 bg-success text-white text-center">
 		<h1 class="h1">SimplePomodoroTimer</h1>
 	</div>
 	<div id="div1" class="container-xxl p-3 bg-danger text-white text-center">
 		<div class="container-xxl p-3">
 			<h2 id="hd1" class="h2">Select one of the timers on duty.</h2>
 			<div id="div2" class="btn-group btn-group-lg">
 				<button id="btn25" class="btn btn-info">25mins. On Duty</button>
 				<button id="btn30" class="btn btn-primary">30mins. On Duty</button>
 				<button id="btn35" class="btn btn-warning">35mins. On Duty</button>
 			</div>
 		</div>
    <div class="container-xxl p-3">
    	<h2 id="hd2" class="h2">Select one of the timers for time-off.</h2>
    	<div class="btn-group btn-group-lg">
    		<button id="btn5" class="btn btn-info">5mins. Off Duty</button>
    		<button id="btn6" class="btn btn-primary">6mins. Off Duty</button>
    		<button id="btn7" class="btn btn-warning">7mins. Off Duty</button>
    	</div>
    </div>
    <div class="container-xxl p-3">
      <h2 class="h2">
        <span id="mins"></span><span id="secs"></span>
      </h2>
    </div>
 		<div class="container-xxl p-3">
 			<h2 class="h2">Any problem? Relax, then Reset.</h2>
 			<button id="btn_RST" class="btn btn-info btn-lg">Reset.</button>
 		</div>
 	</div>
 	<div class="container-xxl p-5 bg-success text-white text-center">
 		<footer>
 			<h3 class="h3">Since Feb, 2022 (C) Y.K</h3>
 		</footer>
 	</div>
 </body>

 </html>
