 <!DOCTYPE html>

 <html lang="ja">

 <head>
 	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
 	<meta name="viewport" content="width=device-width, initial-scale=1">
 	<meta name="description" content="SimplePomodoroTimer">
 	<script type="module" src="assets/dist/main.js"></script>
 	<script type="module" src="top.js"></script>
 	<title>SimplePomodoroTimer</title>
 	<link rel="icon" type="image/x-icon" href="favicon.ico">
 	<link rel="stylesheet" href="assets/dist/style.css" media="all">
 </head>

 <body>

 	<div class="container p-3 bg-success text-white text-center">
 		<h3 class="h3">SimplePomodoroTimer</h3>
 	</div>
 	<div id="div1" class="container p-3 bg-danger bg-opacity-75 text-white text-center">
 		<div class="container p-3">
 			<h4 id="hd1" class="h4">Select one of the timers "ON DUTY".</h4>
 			<div id="div2" class="btn-group btn-group-lg">
 				<button id="btn25" class="btn btn-primary">&nbsp25mins.</button>
 				<button id="btn30" class="btn btn-primary">&nbsp30mins.</button>
 				<button id="btn35" class="btn btn-primary">&nbsp35mins.</button>
 			</div>
 		</div>
 		<div class="container p-3">
 			<h4 id="hd2" class="h4">Select one of the timers for "TIME-OFF".</h4>
 			<div class="btn-group btn-group-lg">
 				<button id="btn5" class="btn btn-warning">&nbsp05mins.</button>
 				<button id="btn6" class="btn btn-warning">&nbsp06mins.</button>
 				<button id="btn7" class="btn btn-warning">&nbsp07mins.</button>
 			</div>
 		</div>
 		<div class="container p-3">
 			<h1 class="display-1 fw-bolder">
 				<span id="mins"></span><span id="secs"></span>
 			</h1>
 		</div>
 		<div class="container p-3">
 			<h4 class="h4">Any problem? Relax, then Reset.</h4>
 			<button id="btn_RST" class="btn btn-info btn-lg">Reset.</button>
 		</div>
 	</div>
 	<div class="container p-1 bg-success text-white text-center">
 		<footer>
 			<h6 class="h6">Since Feb, 2022 (C) Y.K</h6>
 		</footer>
 	</div>
 </body>

 </html>
